{% extends 'bookreserve/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="alert alert-danger">
        <h2>書籍の削除確認</h2>
        <p>本当に「<strong>{{ object.title }}</strong>」を削除してもよろしいですか？</p>
        <p class="text-muted">※この操作は取り消せません。図書室の棚から完全に除籍されます。</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">はい、削除します</button>
        <a href="{% url 'list' %}" class="btn btn-secondary">キャンセル</a>
    </form>
</div>
{% endblock %}
